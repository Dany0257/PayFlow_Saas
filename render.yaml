services:
  # The API Backend (Node.js/NestJS)
  - type: web
    name: payflow-api
    env: docker
    dockerfilePath: ./Dockerfile.api
    plan: free
    region: frankfurt
    healthCheckPath: /api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: payflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: payflow-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: API_URL
        value: https://payflow-api.onrender.com
      - key: APP_URL
        value: https://payflow-web.onrender.com


  # The Frontend Web App (Next.js)
  - type: web
    name: payflow-web
    env: docker
    dockerfilePath: ./Dockerfile.web
    plan: free
    region: frankfurt
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://payflow-api.onrender.com/api

  # Instance Redis gérée
  - type: redis
    name: payflow-redis
    plan: free
    region: frankfurt
    ipAllowList: [] # Laisser vide pour un accès interne uniquement

databases:
  - name: payflow-db
    plan: free
    region: frankfurt
    databaseName: payflow
    user: payflow
